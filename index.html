<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#143b39" />
    <meta
      name="description"
      content="HoySi te dice cuanto si puedes usar hoy, aparta tus pagos, cuida tu flujo y te ayuda a cobrar por WhatsApp."
    />
    <script>
      (function () {
        const params = new URLSearchParams(window.location.search);
        if (!params.has("repair")) {
          return;
        }

        document.documentElement.classList.add("repair-mode");

        async function repairApp() {
          try {
            if ("serviceWorker" in navigator) {
              const registrations = await navigator.serviceWorker.getRegistrations();
              await Promise.all(registrations.map((registration) => registration.unregister()));
            }

            if ("caches" in window) {
              const cacheKeys = await caches.keys();
              await Promise.all(cacheKeys.map((key) => caches.delete(key)));
            }

            if (params.get("reset") === "1") {
              ["hoysi-state-v1", "hoysi-state-v2", "hoysi-state-v3"].forEach((key) => {
                localStorage.removeItem(key);
              });
            }
          } catch (error) {
            console.error("No pude limpiar la app", error);
          }

          const next = params.get("next") || (params.get("reset") === "1" ? "/?fresh=1" : "/");
          window.location.replace(next);
        }

        window.__hoysiRepairPromise = repairApp();
      })();
    </script>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="icon-192.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Outfit:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <title>HoySi</title>
  </head>
  <body>
    <div class="bg-orb orb-a"></div>
    <div class="bg-orb orb-b"></div>
    <div class="bg-grid"></div>

    <div class="app-shell">
      <header class="app-header">
        <div>
          <p class="eyebrow" id="header-greeting">Copiloto financiero diario</p>
          <h1>HoySi</h1>
        </div>
        <div class="header-actions">
          <button class="ghost-button header-new-button" id="open-sheet-button" type="button">Nuevo</button>
          <button class="icon-button settings-button" id="open-settings-button" type="button" aria-label="Configuracion">
            &#9881;
          </button>
        </div>
      </header>

      <main class="screen">
        <section class="view active" data-view="home">
          <div id="home-content"></div>
        </section>

        <section class="view" data-view="flow">
          <div id="flow-content"></div>
        </section>

        <section class="view" data-view="receivables">
          <div id="receivables-content"></div>
        </section>

        <section class="view" data-view="protected">
          <div id="protected-content"></div>
        </section>

        <section class="view" data-view="insights">
          <div id="insights-content"></div>
        </section>
      </main>

      <nav class="bottom-nav" aria-label="Navegacion principal">
        <button class="nav-item active" data-target="home" type="button">
          <span>Hoy</span>
        </button>
        <button class="nav-item" data-target="flow" type="button">
          <span>Flujo</span>
        </button>
        <button class="nav-item" data-target="receivables" type="button">
          <span>Cobros</span>
        </button>
        <button class="nav-item" data-target="protected" type="button">
          <span>Pagos</span>
        </button>
        <button class="nav-item" data-target="insights" type="button">
          <span>Lab</span>
        </button>
      </nav>
    </div>

    <div class="sheet-backdrop hidden" id="sheet-backdrop"></div>

    <section class="sheet hidden" id="entry-sheet" aria-label="Registrar movimiento">
      <div class="sheet-handle"></div>
      <div class="sheet-header">
        <div>
          <p class="eyebrow">Movimiento rapido</p>
          <h2 id="sheet-title">Registrar movimiento</h2>
        </div>
        <button class="icon-button" id="close-sheet-button" type="button" aria-label="Cerrar">
          X
        </button>
      </div>

      <form id="entry-form">
        <div class="kind-switch" id="kind-switch">
          <button class="kind-pill active" data-kind="income" type="button">Entro</button>
          <button class="kind-pill" data-kind="expense" type="button">Salio</button>
          <button class="kind-pill" data-kind="receivable" type="button">Me deben</button>
          <button class="kind-pill" data-kind="saving" type="button">Ahorro</button>
          <button class="kind-pill" data-kind="protect" type="button">Pago</button>
        </div>

        <label class="field">
          <span id="main-label">Que paso</span>
          <input
            id="main-input"
            name="title"
            type="text"
            maxlength="48"
            placeholder="Ej. Venta del dia"
            required
          />
        </label>

        <div class="dual-grid">
          <label class="field">
            <span>Monto</span>
            <input
              name="amount"
              type="number"
              step="0.01"
              min="0.01"
              inputmode="decimal"
              placeholder="0.00"
              required
            />
          </label>

          <label class="field">
            <span>Bolsillo</span>
            <select id="pocket-select" name="pocket"></select>
          </label>
        </div>

        <div class="dual-grid">
          <label class="field">
            <span id="date-label">Fecha</span>
            <input id="date-input" name="date" type="date" required />
          </label>

          <label class="field" id="channel-field">
            <span>Canal</span>
            <select name="channel">
              <option value="cash">Efectivo</option>
              <option value="transfer">Transferencia</option>
              <option value="whatsapp">WhatsApp</option>
              <option value="qr">QR o link</option>
              <option value="other">Otro</option>
            </select>
          </label>
        </div>

        <label class="field hidden" id="phone-field">
          <span id="phone-label">WhatsApp de la persona</span>
          <input
            name="phone"
            type="tel"
            inputmode="tel"
            maxlength="20"
            placeholder="0991234567"
          />
        </label>

        <label class="field">
          <span id="note-label">Nota corta</span>
          <textarea
            name="note"
            rows="2"
            maxlength="90"
            placeholder="Solo lo minimo para recordar"
          ></textarea>
        </label>

        <button class="primary-button" id="submit-button" type="submit">Guardar</button>
        <button class="sheet-secondary-button" id="cancel-sheet-button" type="button">Cerrar</button>
      </form>
    </section>

    <section class="sheet hidden" id="goal-sheet" aria-label="Crear meta">
      <div class="sheet-handle"></div>
      <div class="sheet-header">
        <div>
          <p class="eyebrow">Meta de progreso</p>
          <h2>Crear meta</h2>
        </div>
        <button class="icon-button" id="close-goal-button" type="button" aria-label="Cerrar">
          X
        </button>
      </div>

      <form id="goal-form">
        <label class="field">
          <span>Nombre de la meta</span>
          <input
            id="goal-title-input"
            name="title"
            type="text"
            maxlength="40"
            placeholder="Ej. Colchon de emergencia"
            required
          />
        </label>

        <div class="dual-grid">
          <label class="field">
            <span>Meta total</span>
            <input name="target" type="number" step="0.01" min="1" inputmode="decimal" required />
          </label>

          <label class="field">
            <span>Ya tienes</span>
            <input name="current" type="number" step="0.01" min="0" inputmode="decimal" value="0" required />
          </label>
        </div>

        <div class="dual-grid">
          <label class="field">
            <span>Bolsillo</span>
            <select id="goal-pocket-select" name="pocket"></select>
          </label>

          <label class="field">
            <span>Fecha objetivo</span>
            <input id="goal-date-input" name="dueDate" type="date" required />
          </label>
        </div>

        <label class="field">
          <span>Nota corta</span>
          <textarea name="note" rows="2" maxlength="80" placeholder="Para que no se te olvide por que importa"></textarea>
        </label>

        <button class="primary-button" type="submit">Guardar meta</button>
        <button class="sheet-secondary-button" id="cancel-goal-sheet-button" type="button">Cerrar</button>
      </form>
    </section>

    <section class="setup-overlay hidden" id="setup-overlay">
      <div class="setup-card" id="setup-content"></div>
    </section>

    <section class="setup-overlay hidden" id="settings-overlay">
      <div class="setup-card settings-card" id="settings-content"></div>
    </section>

    <section class="setup-overlay hidden" id="tour-overlay">
      <div class="setup-card tour-card" id="tour-content"></div>
    </section>

    <input id="import-input" class="hidden" type="file" accept="application/json" />
    <div class="toast hidden" id="toast"></div>

    <script src="app.js" defer></script>
  </body>
</html>
