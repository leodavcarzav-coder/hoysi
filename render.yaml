services:
  - type: web
    name: hoysi-beta
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: CONTACT_EMAIL
        value: hola@hoysi.app
      - key: BETA_STAGE
        value: open
      - key: OPENAI_MODEL
        value: gpt-5-mini
    disk:
      name: hoysi-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
